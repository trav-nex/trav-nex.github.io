<svg width="900" height="320" viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="globeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <filter id="globeShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#0ea5e9" flood-opacity="0.2"/>
    </filter>
    <filter id="langShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#1e293b" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="320" fill="#f8fafc"/>

  <!-- Globe Illustration -->
  <g transform="translate(120, 160)">
    <!-- Outer glow -->
    <circle cx="0" cy="0" r="95" fill="#0ea5e9" opacity="0.08"/>
    <circle cx="0" cy="0" r="80" fill="#0ea5e9" opacity="0.1"/>

    <!-- Main globe -->
    <circle cx="0" cy="0" r="70" fill="url(#globeGrad)" filter="url(#globeShadow)"/>

    <!-- Globe lines (latitude/longitude suggestion) -->
    <ellipse cx="0" cy="0" rx="70" ry="25" fill="none" stroke="white" stroke-width="1" opacity="0.3"/>
    <ellipse cx="0" cy="0" rx="70" ry="50" fill="none" stroke="white" stroke-width="1" opacity="0.2"/>
    <ellipse cx="0" cy="0" rx="25" ry="70" fill="none" stroke="white" stroke-width="1" opacity="0.3"/>
    <line x1="-70" y1="0" x2="70" y2="0" stroke="white" stroke-width="1" opacity="0.3"/>
    <line x1="0" y1="-70" x2="0" y2="70" stroke="white" stroke-width="1" opacity="0.3"/>

    <!-- Globe icon -->
    <text x="0" y="10" text-anchor="middle" font-family="Arial, sans-serif" font-size="40" fill="white">🌍</text>
  </g>

  <!-- Connection lines to languages -->
  <line x1="190" y1="100" x2="280" y2="60" stroke="#0ea5e9" stroke-width="2" stroke-dasharray="4,4" opacity="0.4"/>
  <line x1="190" y1="130" x2="280" y2="120" stroke="#10b981" stroke-width="2" stroke-dasharray="4,4" opacity="0.4"/>
  <line x1="190" y1="160" x2="280" y2="180" stroke="#f59e0b" stroke-width="2" stroke-dasharray="4,4" opacity="0.4"/>
  <line x1="190" y1="190" x2="280" y2="240" stroke="#ec4899" stroke-width="2" stroke-dasharray="4,4" opacity="0.4"/>

  <!-- Language Cards Grid -->
  <g transform="translate(290, 30)">
    <!-- Row 1 -->
    <g transform="translate(0, 0)">
      <rect width="130" height="55" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1" filter="url(#langShadow)"/>
      <rect x="10" y="10" width="30" height="22" rx="4" fill="#1e40af"/>
      <text x="25" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="white">EN</text>
      <text x="50" y="24" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1e293b">English</text>
      <text x="50" y="40" font-family="Arial, sans-serif" font-size="8" fill="#64748b">US, UK, AU</text>
    </g>

    <g transform="translate(145, 0)">
      <rect width="130" height="55" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1" filter="url(#langShadow)"/>
      <rect x="10" y="10" width="30" height="22" rx="4" fill="#dc2626"/>
      <text x="25" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="white">ES</text>
      <text x="50" y="24" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1e293b">Spanish</text>
      <text x="50" y="40" font-family="Arial, sans-serif" font-size="8" fill="#64748b">ES, MX, LATAM</text>
    </g>

    <g transform="translate(290, 0)">
      <rect width="130" height="55" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1" filter="url(#langShadow)"/>
      <rect x="10" y="10" width="30" height="22" rx="4" fill="#2563eb"/>
      <text x="25" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="white">FR</text>
      <text x="50" y="24" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1e293b">French</text>
      <text x="50" y="40" font-family="Arial, sans-serif" font-size="8" fill="#64748b">FR, CA, BE</text>
    </g>

    <g transform="translate(435, 0)">
      <rect width="130" height="55" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1" filter="url(#langShadow)"/>
      <rect x="10" y="10" width="30" height="22" rx="4" fill="#1e293b"/>
      <text x="25" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#fcd34d">DE</text>
      <text x="50" y="24" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1e293b">German</text>
      <text x="50" y="40" font-family="Arial, sans-serif" font-size="8" fill="#64748b">DE, AT, CH</text>
    </g>

    <!-- Row 2 -->
    <g transform="translate(0, 65)">
      <rect width="130" height="55" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1" filter="url(#langShadow)"/>
      <rect x="10" y="10" width="30" height="22" rx="4" fill="#16a34a"/>
      <text x="25" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="white">PT</text>
      <text x="50" y="24" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1e293b">Portuguese</text>
      <text x="50" y="40" font-family="Arial, sans-serif" font-size="8" fill="#64748b">BR, PT</text>
    </g>

    <g transform="translate(145, 65)">
      <rect width="130" height="55" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1" filter="url(#langShadow)"/>
      <rect x="10" y="10" width="30" height="22" rx="4" fill="#dc2626"/>
      <text x="25" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="white">JA</text>
      <text x="50" y="24" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1e293b">Japanese</text>
      <text x="50" y="40" font-family="Arial, sans-serif" font-size="8" fill="#64748b">日本語</text>
    </g>

    <g transform="translate(290, 65)">
      <rect width="130" height="55" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1" filter="url(#langShadow)"/>
      <rect x="10" y="10" width="30" height="22" rx="4" fill="#f59e0b"/>
      <text x="25" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="white">AR</text>
      <text x="50" y="24" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1e293b">Arabic</text>
      <text x="50" y="40" font-family="Arial, sans-serif" font-size="8" fill="#64748b">العربية</text>
    </g>

    <g transform="translate(435, 65)">
      <rect width="130" height="55" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1" filter="url(#langShadow)"/>
      <rect x="10" y="10" width="30" height="22" rx="4" fill="#f97316"/>
      <text x="25" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="white">HI</text>
      <text x="50" y="24" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1e293b">Hindi</text>
      <text x="50" y="40" font-family="Arial, sans-serif" font-size="8" fill="#64748b">हिन्दी</text>
    </g>

    <!-- Row 3 -->
    <g transform="translate(0, 130)">
      <rect width="130" height="55" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1" filter="url(#langShadow)"/>
      <rect x="10" y="10" width="30" height="22" rx="4" fill="#dc2626"/>
      <text x="25" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#fcd34d">ZH</text>
      <text x="50" y="24" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1e293b">Chinese</text>
      <text x="50" y="40" font-family="Arial, sans-serif" font-size="8" fill="#64748b">中文</text>
    </g>

    <g transform="translate(145, 130)">
      <rect width="130" height="55" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1" filter="url(#langShadow)"/>
      <rect x="10" y="10" width="30" height="22" rx="4" fill="#0ea5e9"/>
      <text x="25" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="white">KO</text>
      <text x="50" y="24" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1e293b">Korean</text>
      <text x="50" y="40" font-family="Arial, sans-serif" font-size="8" fill="#64748b">한국어</text>
    </g>

    <g transform="translate(290, 130)">
      <rect width="130" height="55" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1" filter="url(#langShadow)"/>
      <rect x="10" y="10" width="30" height="22" rx="4" fill="#16a34a"/>
      <text x="25" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="white">IT</text>
      <text x="50" y="24" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1e293b">Italian</text>
      <text x="50" y="40" font-family="Arial, sans-serif" font-size="8" fill="#64748b">IT, CH</text>
    </g>

    <g transform="translate(435, 130)">
      <rect width="130" height="55" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="2" filter="url(#langShadow)"/>
      <text x="65" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#16a34a">+20</text>
      <text x="65" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#16a34a">More Languages</text>
    </g>
  </g>

  <!-- Translation Feature Box -->
  <g transform="translate(290, 210)">
    <rect width="565" height="80" rx="12" fill="white" stroke="#0ea5e9" stroke-width="2" filter="url(#langShadow)"/>

    <rect x="15" y="15" width="50" height="50" rx="10" fill="#0ea5e9" opacity="0.1"/>
    <text x="40" y="48" text-anchor="middle" font-family="Arial, sans-serif" font-size="24">🔄</text>

    <text x="80" y="35" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1e293b">Real-Time Translation</text>
    <text x="80" y="55" font-family="Arial, sans-serif" font-size="11" fill="#64748b">Live translation during conversations • Native-quality pronunciation</text>
    <text x="80" y="72" font-family="Arial, sans-serif" font-size="11" fill="#64748b">Automatic language detection • Seamless switching</text>

    <rect x="430" y="22" width="120" height="36" rx="8" fill="#0ea5e9"/>
    <text x="490" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">Global Ready</text>
  </g>
</svg>