<svg width="900" height="600" viewBox="0 0 900 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="600" fill="#f8fafc"/>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1e293b">Assistant Setup Flow</text>
  <text x="450" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#64748b">7-step process to configure and deploy your AI assistant</text>

  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
    <marker id="arrow-down" markerWidth="7" markerHeight="10" refX="3.5" refY="9" orient="auto">
      <polygon points="0 0, 7 0, 3.5 10" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Row 1: Steps 1-4 -->

  <!-- Step 1: Choose Assistant Type -->
  <rect x="40" y="80" width="180" height="110" rx="12" fill="white" stroke="#6366f1" stroke-width="2"/>
  <rect x="40" y="80" width="180" height="32" rx="12" fill="#6366f1"/>
  <rect x="40" y="100" width="180" height="12" fill="#6366f1"/>
  <text x="60" y="100" font-family="Arial, sans-serif" font-size="14" fill="white">🤖</text>
  <text x="80" y="101" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">STEP 1</text>
  <text x="130" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#4338ca">Choose Type</text>
  <text x="130" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#6366f1">Phone Assistant</text>
  <text x="130" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#6366f1">or Web Assistant</text>
  <text x="130" y="183" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">Select your channel</text>

  <!-- Arrow 1->2 -->
  <path d="M225 135 L250 135" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- Step 2: Voice & Language -->
  <rect x="255" y="80" width="180" height="110" rx="12" fill="white" stroke="#10b981" stroke-width="2"/>
  <rect x="255" y="80" width="180" height="32" rx="12" fill="#10b981"/>
  <rect x="255" y="100" width="180" height="12" fill="#10b981"/>
  <text x="275" y="100" font-family="Arial, sans-serif" font-size="14" fill="white">🌐</text>
  <text x="295" y="101" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">STEP 2</text>
  <text x="345" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#047857">Voice &amp; Language</text>
  <text x="345" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#10b981">30+ languages</text>
  <text x="345" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#10b981">Multiple voice options</text>
  <text x="345" y="183" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">Match your brand</text>

  <!-- Arrow 2->3 -->
  <path d="M440 135 L465 135" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- Step 3: Role & Objective -->
  <rect x="470" y="80" width="180" height="110" rx="12" fill="white" stroke="#f59e0b" stroke-width="2"/>
  <rect x="470" y="80" width="180" height="32" rx="12" fill="#f59e0b"/>
  <rect x="470" y="100" width="180" height="12" fill="#f59e0b"/>
  <text x="490" y="100" font-family="Arial, sans-serif" font-size="14" fill="white">🎯</text>
  <text x="510" y="101" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">STEP 3</text>
  <text x="560" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#b45309">Role &amp; Objective</text>
  <text x="560" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#f59e0b">Ready-made templates</text>
  <text x="560" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#f59e0b">or custom role</text>
  <text x="560" y="183" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">Define personality</text>

  <!-- Arrow 3->4 -->
  <path d="M655 135 L680 135" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- Step 4: Capabilities -->
  <rect x="685" y="80" width="180" height="110" rx="12" fill="white" stroke="#ec4899" stroke-width="2"/>
  <rect x="685" y="80" width="180" height="32" rx="12" fill="#ec4899"/>
  <rect x="685" y="100" width="180" height="12" fill="#ec4899"/>
  <text x="705" y="100" font-family="Arial, sans-serif" font-size="14" fill="white">⚙️</text>
  <text x="725" y="101" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">STEP 4</text>
  <text x="775" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#be185d">Capabilities</text>
  <text x="775" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#ec4899">Appointments, Orders</text>
  <text x="775" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#ec4899">Reservations, etc.</text>
  <text x="775" y="183" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">Platform services</text>

  <!-- Arrow 4 down to row 2 -->
  <path d="M775 195 L775 230" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrow-down)"/>

  <!-- Row 2: Steps 5-7 (reversed direction) -->

  <!-- Step 5: Knowledge Base -->
  <rect x="685" y="240" width="180" height="110" rx="12" fill="white" stroke="#8b5cf6" stroke-width="2"/>
  <rect x="685" y="240" width="180" height="32" rx="12" fill="#8b5cf6"/>
  <rect x="685" y="260" width="180" height="12" fill="#8b5cf6"/>
  <text x="705" y="260" font-family="Arial, sans-serif" font-size="14" fill="white">📚</text>
  <text x="725" y="261" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">STEP 5</text>
  <text x="775" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#6d28d9">Knowledge Base</text>
  <text x="775" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#8b5cf6">Text, Website import</text>
  <text x="775" y="328" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#8b5cf6">Document upload</text>
  <text x="775" y="343" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">Train your assistant</text>

  <!-- Arrow 5->6 (left) -->
  <path d="M680 295 L440 295" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- Step 6: Channel Config -->
  <rect x="255" y="240" width="180" height="110" rx="12" fill="white" stroke="#0ea5e9" stroke-width="2"/>
  <rect x="255" y="240" width="180" height="32" rx="12" fill="#0ea5e9"/>
  <rect x="255" y="260" width="180" height="12" fill="#0ea5e9"/>
  <text x="275" y="260" font-family="Arial, sans-serif" font-size="14" fill="white">📡</text>
  <text x="295" y="261" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">STEP 6</text>
  <text x="345" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#0369a1">Channel Config</text>
  <text x="345" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#0ea5e9">Phone: Purchase number</text>
  <text x="345" y="328" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#0ea5e9">Web: Mode + URL</text>
  <text x="345" y="343" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">Connect your channel</text>

  <!-- Arrow 6->7 (left) -->
  <path d="M250 295 L95 295" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- Step 7: Testing & Deploy (highlighted) -->
  <rect x="40" y="240" width="50" height="110" rx="12" fill="#22c55e" opacity="0.15"/>
  <rect x="40" y="240" width="180" height="110" rx="12" fill="white" stroke="#22c55e" stroke-width="3"/>
  <rect x="40" y="240" width="180" height="32" rx="12" fill="#22c55e"/>
  <rect x="40" y="260" width="180" height="12" fill="#22c55e"/>
  <text x="60" y="260" font-family="Arial, sans-serif" font-size="14" fill="white">🚀</text>
  <text x="80" y="261" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">STEP 7</text>
  <text x="130" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#15803d">Testing &amp; Deploy</text>
  <text x="130" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#22c55e">Pre-launch check</text>
  <text x="130" y="328" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#22c55e">Deploy &amp; Test</text>
  <text x="130" y="343" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">Go live!</text>

  <!-- Important Note Box -->
  <rect x="40" y="380" width="380" height="90" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="60" y="405" font-family="Arial, sans-serif" font-size="13" fill="#f59e0b">⚠️</text>
  <text x="85" y="406" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#b45309">Important: Configuration Requirement</text>
  <text x="60" y="430" font-family="Arial, sans-serif" font-size="11" fill="#92400e">At minimum, either Step 4 (Capabilities) or Step 5</text>
  <text x="60" y="448" font-family="Arial, sans-serif" font-size="11" fill="#92400e">(Knowledge Base) must be configured.</text>
  <text x="60" y="463" font-family="Arial, sans-serif" font-size="10" fill="#b45309" font-style="italic">Both recommended for full functionality.</text>

  <!-- Channel-Specific Info -->
  <rect x="450" y="380" width="415" height="90" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="470" y="405" font-family="Arial, sans-serif" font-size="13" fill="#3b82f6">📋</text>
  <text x="495" y="406" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1e40af">Channel-Specific Steps</text>

  <rect x="470" y="420" width="180" height="40" rx="6" fill="#eef2ff"/>
  <text x="480" y="438" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#4338ca">📞 Phone Assistant</text>
  <text x="480" y="453" font-family="Arial, sans-serif" font-size="9" fill="#6366f1">Purchase dedicated number</text>

  <rect x="665" y="420" width="180" height="40" rx="6" fill="#ecfdf5"/>
  <text x="675" y="438" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#047857">💬 Web Assistant</text>
  <text x="675" y="453" font-family="Arial, sans-serif" font-size="9" fill="#10b981">Select mode + Enter URL</text>

  <!-- Bottom Result -->
  <rect x="200" y="500" width="500" height="50" rx="12" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="450" y="522" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#22c55e">✓</text>
  <text x="470" y="522" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#15803d">Assistant Deployed</text>
  <text x="450" y="540" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#16a34a">Phone: Receiving calls &amp; SMS  |  Web: Widget ready to embed</text>

  <!-- Flow indicator -->
  <text x="450" y="580" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">Steps 1-3 define identity • Steps 4-5 add intelligence • Steps 6-7 connect &amp; launch</text>
</svg>