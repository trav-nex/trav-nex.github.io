<svg width="900" height="360" viewBox="0 0 900 360" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="opsGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899"/>
      <stop offset="100%" style="stop-color:#f43f5e"/>
    </linearGradient>
    <filter id="opsShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1e293b" flood-opacity="0.1"/>
    </filter>
    <filter id="cardHover" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#1e293b" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="360" fill="#f8fafc"/>

  <!-- Decorative elements -->
  <circle cx="850" cy="50" r="100" fill="#ec4899" opacity="0.04"/>
  <circle cx="50" cy="310" r="80" fill="#f59e0b" opacity="0.04"/>

  <!-- Section Title -->
  <text x="450" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1e293b">Automated Business Operations</text>
  <text x="450" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#64748b">Your AI assistant takes real actions on behalf of your business</text>

  <!-- Operation Cards -->

  <!-- Appointments -->
  <g transform="translate(40, 75)">
    <rect width="195" height="180" rx="16" fill="white" stroke="#e2e8f0" stroke-width="1" filter="url(#opsShadow)"/>

    <!-- Icon header -->
    <rect x="0" y="0" width="195" height="55" rx="16" fill="#6366f1" opacity="0.1"/>
    <rect x="0" y="40" width="195" height="15" fill="#6366f1" opacity="0.1"/>
    <circle cx="35" cy="28" r="20" fill="#6366f1"/>
    <text x="35" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="white">📅</text>
    <text x="70" y="25" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1e293b">Appointments</text>
    <text x="70" y="40" font-family="Arial, sans-serif" font-size="9" fill="#64748b">AI-powered scheduling</text>

    <!-- Features -->
    <g transform="translate(15, 70)">
      <circle cx="8" cy="8" r="4" fill="#22c55e"/>
      <text x="20" y="12" font-family="Arial, sans-serif" font-size="10" fill="#334155">Book appointments</text>

      <circle cx="8" cy="30" r="4" fill="#22c55e"/>
      <text x="20" y="34" font-family="Arial, sans-serif" font-size="10" fill="#334155">Check availability</text>

      <circle cx="8" cy="52" r="4" fill="#22c55e"/>
      <text x="20" y="56" font-family="Arial, sans-serif" font-size="10" fill="#334155">Send confirmations</text>

      <circle cx="8" cy="74" r="4" fill="#22c55e"/>
      <text x="20" y="78" font-family="Arial, sans-serif" font-size="10" fill="#334155">Handle rescheduling</text>
    </g>

    <!-- Use case tag -->
    <rect x="15" y="155" width="165" height="18" rx="4" fill="#eef2ff"/>
    <text x="97" y="167" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#4f46e5">Clinics • Salons • Consultants</text>
  </g>

  <!-- Reservations -->
  <g transform="translate(255, 75)">
    <rect width="195" height="180" rx="16" fill="white" stroke="#e2e8f0" stroke-width="1" filter="url(#opsShadow)"/>

    <rect x="0" y="0" width="195" height="55" rx="16" fill="#10b981" opacity="0.1"/>
    <rect x="0" y="40" width="195" height="15" fill="#10b981" opacity="0.1"/>
    <circle cx="35" cy="28" r="20" fill="#10b981"/>
    <text x="35" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="white">🪑</text>
    <text x="70" y="25" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1e293b">Reservations</text>
    <text x="70" y="40" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Tables, rooms, resources</text>

    <g transform="translate(15, 70)">
      <circle cx="8" cy="8" r="4" fill="#22c55e"/>
      <text x="20" y="12" font-family="Arial, sans-serif" font-size="10" fill="#334155">Table reservations</text>

      <circle cx="8" cy="30" r="4" fill="#22c55e"/>
      <text x="20" y="34" font-family="Arial, sans-serif" font-size="10" fill="#334155">Room bookings</text>

      <circle cx="8" cy="52" r="4" fill="#22c55e"/>
      <text x="20" y="56" font-family="Arial, sans-serif" font-size="10" fill="#334155">Equipment rentals</text>

      <circle cx="8" cy="74" r="4" fill="#22c55e"/>
      <text x="20" y="78" font-family="Arial, sans-serif" font-size="10" fill="#334155">Calendar sync</text>
    </g>

    <rect x="15" y="155" width="165" height="18" rx="4" fill="#ecfdf5"/>
    <text x="97" y="167" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#047857">Restaurants • Hotels • Studios</text>
  </g>

  <!-- Menu/Orders -->
  <g transform="translate(470, 75)">
    <rect width="195" height="180" rx="16" fill="white" stroke="#e2e8f0" stroke-width="1" filter="url(#opsShadow)"/>

    <rect x="0" y="0" width="195" height="55" rx="16" fill="#f59e0b" opacity="0.1"/>
    <rect x="0" y="40" width="195" height="15" fill="#f59e0b" opacity="0.1"/>
    <circle cx="35" cy="28" r="20" fill="#f59e0b"/>
    <text x="35" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="white">🍽️</text>
    <text x="70" y="25" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1e293b">Menu &amp; Orders</text>
    <text x="70" y="40" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Food &amp; product orders</text>

    <g transform="translate(15, 70)">
      <circle cx="8" cy="8" r="4" fill="#22c55e"/>
      <text x="20" y="12" font-family="Arial, sans-serif" font-size="10" fill="#334155">Browse menu items</text>

      <circle cx="8" cy="30" r="4" fill="#22c55e"/>
      <text x="20" y="34" font-family="Arial, sans-serif" font-size="10" fill="#334155">Process orders</text>

      <circle cx="8" cy="52" r="4" fill="#22c55e"/>
      <text x="20" y="56" font-family="Arial, sans-serif" font-size="10" fill="#334155">Dine-in / Takeout</text>

      <circle cx="8" cy="74" r="4" fill="#22c55e"/>
      <text x="20" y="78" font-family="Arial, sans-serif" font-size="10" fill="#334155">Delivery coordination</text>
    </g>

    <rect x="15" y="155" width="165" height="18" rx="4" fill="#fef3c7"/>
    <text x="97" y="167" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#b45309">Restaurants • Cafes • Food Service</text>
  </g>

  <!-- Property -->
  <g transform="translate(685, 75)">
    <rect width="195" height="180" rx="16" fill="white" stroke="#e2e8f0" stroke-width="1" filter="url(#opsShadow)"/>

    <rect x="0" y="0" width="195" height="55" rx="16" fill="#ec4899" opacity="0.1"/>
    <rect x="0" y="40" width="195" height="15" fill="#ec4899" opacity="0.1"/>
    <circle cx="35" cy="28" r="20" fill="#ec4899"/>
    <text x="35" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="white">🏠</text>
    <text x="70" y="25" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1e293b">Property</text>
    <text x="70" y="40" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Listings &amp; inquiries</text>

    <g transform="translate(15, 70)">
      <circle cx="8" cy="8" r="4" fill="#22c55e"/>
      <text x="20" y="12" font-family="Arial, sans-serif" font-size="10" fill="#334155">Property details</text>

      <circle cx="8" cy="30" r="4" fill="#22c55e"/>
      <text x="20" y="34" font-family="Arial, sans-serif" font-size="10" fill="#334155">Answer questions</text>

      <circle cx="8" cy="52" r="4" fill="#22c55e"/>
      <text x="20" y="56" font-family="Arial, sans-serif" font-size="10" fill="#334155">Schedule viewings</text>

      <circle cx="8" cy="74" r="4" fill="#22c55e"/>
      <text x="20" y="78" font-family="Arial, sans-serif" font-size="10" fill="#334155">Capture leads</text>
    </g>

    <rect x="15" y="155" width="165" height="18" rx="4" fill="#fce7f3"/>
    <text x="97" y="167" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#be185d">Real Estate • Rentals • Brokers</text>
  </g>

  <!-- Bottom flow illustration -->
  <g transform="translate(40, 280)">
    <rect width="820" height="60" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1" filter="url(#opsShadow)"/>

    <!-- Flow steps -->
    <g transform="translate(30, 15)">
      <circle cx="15" cy="15" r="15" fill="#6366f1"/>
      <text x="15" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">1</text>
      <text x="40" y="15" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#1e293b">Customer</text>
      <text x="40" y="28" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Makes request</text>
    </g>

    <line x1="140" y1="30" x2="180" y2="30" stroke="#e2e8f0" stroke-width="2"/>
    <polygon points="175,25 185,30 175,35" fill="#e2e8f0"/>

    <g transform="translate(200, 15)">
      <circle cx="15" cy="15" r="15" fill="#10b981"/>
      <text x="15" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">2</text>
      <text x="40" y="15" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#1e293b">AI Processes</text>
      <text x="40" y="28" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Understands intent</text>
    </g>

    <line x1="330" y1="30" x2="370" y2="30" stroke="#e2e8f0" stroke-width="2"/>
    <polygon points="365,25 375,30 365,35" fill="#e2e8f0"/>

    <g transform="translate(390, 15)">
      <circle cx="15" cy="15" r="15" fill="#f59e0b"/>
      <text x="15" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">3</text>
      <text x="40" y="15" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#1e293b">Takes Action</text>
      <text x="40" y="28" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Books/orders/reserves</text>
    </g>

    <line x1="520" y1="30" x2="560" y2="30" stroke="#e2e8f0" stroke-width="2"/>
    <polygon points="555,25 565,30 555,35" fill="#e2e8f0"/>

    <g transform="translate(580, 15)">
      <circle cx="15" cy="15" r="15" fill="#ec4899"/>
      <text x="15" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">4</text>
      <text x="40" y="15" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#1e293b">Confirms</text>
      <text x="40" y="28" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Sends notification</text>
    </g>

    <line x1="700" y1="30" x2="740" y2="30" stroke="#e2e8f0" stroke-width="2"/>
    <polygon points="735,25 745,30 735,35" fill="#e2e8f0"/>

    <g transform="translate(755, 15)">
      <rect width="45" height="30" rx="6" fill="#dcfce7"/>
      <text x="22" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="14">✓</text>
    </g>
  </g>
</svg>