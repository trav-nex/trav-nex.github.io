<svg width="900" height="520" viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="setupGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f87b38"/>
      <stop offset="100%" style="stop-color:#ea580c"/>
    </linearGradient>
    <filter id="setupShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1e293b" flood-opacity="0.1"/>
    </filter>
    <filter id="stepShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#1e293b" flood-opacity="0.08"/>
    </filter>
    <marker id="setupArrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#cbd5e1"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" fill="#f8fafc"/>

  <!-- Decorative elements -->
  <circle cx="50" cy="50" r="100" fill="#f87b38" opacity="0.04"/>
  <circle cx="850" cy="470" r="120" fill="#22c55e" opacity="0.04"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1e293b">Account Setup Flow</text>
  <text x="450" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#64748b">Configure your workspace, business profile, and platform services</text>

  <!-- Step 1: Workspace Type -->
  <g transform="translate(40, 85)">
    <rect width="175" height="105" rx="14" fill="white" stroke="#e2e8f0" stroke-width="1" filter="url(#stepShadow)"/>
    <rect x="0" y="0" width="175" height="35" rx="14" fill="#f87b38"/>
    <rect x="0" y="20" width="175" height="15" fill="#f87b38"/>
    <text x="15" y="24" font-family="Arial, sans-serif" font-size="14" fill="white">🏢</text>
    <text x="38" y="24" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">STEP 1</text>
    <text x="87" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1e293b">Workspace Type</text>
    <text x="87" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Business or Developer</text>
    <rect x="30" y="88" width="50" height="14" rx="4" fill="#fff7ed"/>
    <text x="55" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#ea580c">Business</text>
    <rect x="90" y="88" width="55" height="14" rx="4" fill="#f1f5f9"/>
    <text x="117" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#64748b">Developer</text>
  </g>

  <!-- Arrow 1→2 -->
  <line x1="220" y1="137" x2="250" y2="137" stroke="#cbd5e1" stroke-width="2" marker-end="url(#setupArrow)"/>

  <!-- Step 2: Industry -->
  <g transform="translate(255, 85)">
    <rect width="175" height="105" rx="14" fill="white" stroke="#e2e8f0" stroke-width="1" filter="url(#stepShadow)"/>
    <rect x="0" y="0" width="175" height="35" rx="14" fill="#6366f1"/>
    <rect x="0" y="20" width="175" height="15" fill="#6366f1"/>
    <text x="15" y="24" font-family="Arial, sans-serif" font-size="14" fill="white">🏭</text>
    <text x="38" y="24" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">STEP 2</text>
    <text x="87" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1e293b">Industry</text>
    <text x="87" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Select your business</text>
    <text x="87" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">category</text>
  </g>

  <!-- Arrow 2→3 -->
  <line x1="435" y1="137" x2="465" y2="137" stroke="#cbd5e1" stroke-width="2" marker-end="url(#setupArrow)"/>

  <!-- Step 3: Business Information -->
  <g transform="translate(470, 85)">
    <rect width="175" height="105" rx="14" fill="white" stroke="#e2e8f0" stroke-width="1" filter="url(#stepShadow)"/>
    <rect x="0" y="0" width="175" height="35" rx="14" fill="#10b981"/>
    <rect x="0" y="20" width="175" height="15" fill="#10b981"/>
    <text x="15" y="24" font-family="Arial, sans-serif" font-size="14" fill="white">📋</text>
    <text x="38" y="24" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">STEP 3</text>
    <text x="87" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1e293b">Business Info</text>
    <text x="87" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Name &amp; phone number</text>
    <text x="87" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">for verification</text>
  </g>

  <!-- Arrow 3→4 -->
  <line x1="650" y1="137" x2="680" y2="137" stroke="#cbd5e1" stroke-width="2" marker-end="url(#setupArrow)"/>

  <!-- Step 4: Business Address -->
  <g transform="translate(685, 85)">
    <rect width="175" height="105" rx="14" fill="white" stroke="#e2e8f0" stroke-width="1" filter="url(#stepShadow)"/>
    <rect x="0" y="0" width="175" height="35" rx="14" fill="#0ea5e9"/>
    <rect x="0" y="20" width="175" height="15" fill="#0ea5e9"/>
    <text x="15" y="24" font-family="Arial, sans-serif" font-size="14" fill="white">📍</text>
    <text x="38" y="24" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">STEP 4</text>
    <text x="87" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1e293b">Address</text>
    <text x="87" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Location for timezone</text>
    <text x="87" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">&amp; compliance</text>
  </g>

  <!-- Arrow 4 down -->
  <path d="M772 195 L772 220 L772 235" stroke="#cbd5e1" stroke-width="2" fill="none" marker-end="url(#setupArrow)"/>

  <!-- Step 5: Communication Preferences -->
  <g transform="translate(685, 240)">
    <rect width="175" height="105" rx="14" fill="white" stroke="#e2e8f0" stroke-width="1" filter="url(#stepShadow)"/>
    <rect x="0" y="0" width="175" height="35" rx="14" fill="#f59e0b"/>
    <rect x="0" y="20" width="175" height="15" fill="#f59e0b"/>
    <text x="15" y="24" font-family="Arial, sans-serif" font-size="14" fill="white">🔔</text>
    <text x="38" y="24" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">STEP 5</text>
    <text x="87" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1e293b">Notifications</text>
    <text x="87" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Communication</text>
    <text x="87" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">preferences</text>
  </g>

  <!-- Arrow 5←6 -->
  <line x1="680" y1="292" x2="435" y2="292" stroke="#cbd5e1" stroke-width="2" marker-end="url(#setupArrow)"/>

  <!-- Step 6: Operating Hours -->
  <g transform="translate(255, 240)">
    <rect width="175" height="105" rx="14" fill="white" stroke="#e2e8f0" stroke-width="1" filter="url(#stepShadow)"/>
    <rect x="0" y="0" width="175" height="35" rx="14" fill="#8b5cf6"/>
    <rect x="0" y="20" width="175" height="15" fill="#8b5cf6"/>
    <text x="15" y="24" font-family="Arial, sans-serif" font-size="14" fill="white">🕐</text>
    <text x="38" y="24" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">STEP 6</text>
    <text x="87" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1e293b">Operating Hours</text>
    <text x="87" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Business schedule</text>
    <text x="87" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">&amp; availability</text>
  </g>

  <!-- Arrow 6←7 -->
  <line x1="250" y1="292" x2="220" y2="292" stroke="#cbd5e1" stroke-width="2" marker-end="url(#setupArrow)"/>

  <!-- Step 7: Platform Services (highlighted as final) -->
  <g transform="translate(40, 240)">
    <rect width="175" height="105" rx="14" fill="white" stroke="#22c55e" stroke-width="2" filter="url(#stepShadow)"/>
    <rect x="0" y="0" width="175" height="35" rx="14" fill="#22c55e"/>
    <rect x="0" y="20" width="175" height="15" fill="#22c55e"/>
    <text x="15" y="24" font-family="Arial, sans-serif" font-size="14" fill="white">⚙️</text>
    <text x="38" y="24" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">STEP 7</text>
    <text x="87" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1e293b">Platform Services</text>
    <text x="87" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">Enable business</text>
    <text x="87" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">capabilities</text>
  </g>

  <!-- Industries Section -->
  <g transform="translate(40, 375)">
    <rect width="400" height="120" rx="14" fill="white" stroke="#e2e8f0" stroke-width="1" filter="url(#setupShadow)"/>
    <text x="20" y="28" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1e293b">Supported Industries</text>

    <!-- Industry chips row 1 -->
    <g transform="translate(20, 42)">
      <rect width="85" height="28" rx="6" fill="#fef2f2"/>
      <text x="42" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#dc2626">❤️ Healthcare</text>
    </g>
    <g transform="translate(115, 42)">
      <rect width="70" height="28" rx="6" fill="#f0fdf4"/>
      <text x="35" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#16a34a">💪 Wellness</text>
    </g>
    <g transform="translate(195, 42)">
      <rect width="60" height="28" rx="6" fill="#fef3c7"/>
      <text x="30" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#d97706">🛍️ Retail</text>
    </g>
    <g transform="translate(265, 42)">
      <rect width="70" height="28" rx="6" fill="#eff6ff"/>
      <text x="35" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2563eb">🏛️ Finance</text>
    </g>
    <g transform="translate(345, 42)">
      <rect width="40" height="28" rx="6" fill="#f5f3ff"/>
      <text x="20" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#7c3aed">+6</text>
    </g>

    <!-- Industry chips row 2 -->
    <g transform="translate(20, 78)">
      <rect width="80" height="28" rx="6" fill="#fce7f3"/>
      <text x="40" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#be185d">🏠 Real Estate</text>
    </g>
    <g transform="translate(110, 78)">
      <rect width="60" height="28" rx="6" fill="#e0f2fe"/>
      <text x="30" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#0284c7">💻 Tech</text>
    </g>
    <g transform="translate(180, 78)">
      <rect width="80" height="28" rx="6" fill="#fef3c7"/>
      <text x="40" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#d97706">🎓 Education</text>
    </g>
    <g transform="translate(270, 78)">
      <rect width="55" height="28" rx="6" fill="#f1f5f9"/>
      <text x="27" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#475569">⚖️ Legal</text>
    </g>
    <g transform="translate(335, 78)">
      <rect width="50" height="28" rx="6" fill="#ecfdf5"/>
      <text x="25" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#059669">🏨 Hotel</text>
    </g>
  </g>

  <!-- Platform Services Section -->
  <g transform="translate(460, 375)">
    <rect width="400" height="120" rx="14" fill="white" stroke="#e2e8f0" stroke-width="1" filter="url(#setupShadow)"/>
    <text x="20" y="28" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1e293b">Available Platform Services</text>

    <!-- Services grid -->
    <g transform="translate(20, 42)">
      <rect width="110" height="32" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
      <text x="55" y="14" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#16a34a">📅 Appointments</text>
      <text x="55" y="26" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#15803d">Booking &amp; scheduling</text>
    </g>
    <g transform="translate(140, 42)">
      <rect width="110" height="32" rx="6" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
      <text x="55" y="14" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#2563eb">🪑 Reservations</text>
      <text x="55" y="26" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#1d4ed8">Tables &amp; rooms</text>
    </g>
    <g transform="translate(260, 42)">
      <rect width="110" height="32" rx="6" fill="#fef3c7" stroke="#fcd34d" stroke-width="1"/>
      <text x="55" y="14" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#d97706">🍽️ Menu</text>
      <text x="55" y="26" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#b45309">Food ordering</text>
    </g>

    <g transform="translate(20, 82)">
      <rect width="110" height="32" rx="6" fill="#fae8ff" stroke="#e879f9" stroke-width="1"/>
      <text x="55" y="14" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#a21caf">📦 Products</text>
      <text x="55" y="26" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#86198f">Catalog &amp; orders</text>
    </g>
    <g transform="translate(140, 82)">
      <rect width="110" height="32" rx="6" fill="#fce7f3" stroke="#f9a8d4" stroke-width="1"/>
      <text x="55" y="14" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#be185d">🏠 Property</text>
      <text x="55" y="26" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#9d174d">Listings &amp; leads</text>
    </g>
    <g transform="translate(260, 82)">
      <rect width="110" height="32" rx="6" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="1"/>
      <text x="55" y="14" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#0284c7">📊 Inventory</text>
      <text x="55" y="26" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#0369a1">Stock tracking</text>
    </g>
  </g>
</svg>